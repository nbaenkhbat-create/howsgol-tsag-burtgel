<!DOCTYPE html>
<html lang="mn">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Цаг захиалах</title>
  <link rel="stylesheet" href="/assets/styles.css" />
</head>
<body>
  <div class="topbar">
    <div class="brand">Цаг<span>Захиалга</span></div>
    <div class="meta"><a href="/">← Хайлт</a></div>
  </div>

  <div class="container" id="main">
    <h1 id="coName">Уншиж байна…</h1>
    <p class="subtitle">Өнөөдөр болон маргаашийн сул цагийг харж, сул цаг дээр дарж захиална уу.</p>

    <div class="card" id="card">
      <div id="nextDays" class="list" style="margin-bottom:16px;"></div>

      <div class="toolbar">
        <div class="field">
          <label>Өдөр сонгох</label>
          <input type="date" id="datePicker" />
        </div>
      </div>

      <div class="alert" id="banner"></div>

      <div class="legend">
        <span><span class="dot available"></span>Сул цаг</span>
        <span><span class="dot blocked"></span>Боломжгүй</span>
      </div>

      <div class="slots-row-label">Өглөө / Өдөр (1–12)</div>
      <div class="slots-grid" id="rowAm"></div>
      <div class="slots-row-label">Орой / Шөнө (13–24)</div>
      <div class="slots-grid" id="rowPm"></div>
    </div>
  </div>

  <!-- BOOKING FORM MODAL -->
  <div class="modal-backdrop" id="bookModal">
    <div class="modal">
      <h2>Цаг захиалах</h2>
      <p class="subtitle" id="bookTime"></p>
      <div class="alert" id="bookAlert"></div>
      <div class="field">
        <label>Таны нэр</label>
        <input type="text" id="custName" placeholder="Нэр" />
      </div>
      <div class="field">
        <label>Утасны дугаар</label>
        <input type="tel" id="custPhone" placeholder="99112233" />
      </div>
      <div class="row-actions mt">
        <button class="btn full" id="confirmBtn">Захиалга баталгаажуулах</button>
      </div>
      <button class="btn ghost full mt" id="closeBookBtn">Болих</button>
    </div>
  </div>

  <script src="/assets/common.js"></script>
  <script>
    const { api, showAlert, hideAlert, el, todayStr, HOUR_LABELS } = App;
    const username = decodeURIComponent(location.pathname.split('/').filter(Boolean)[0] || '');

    let selectedHour = null;

    async function init() {
      try {
        const info = await api('/api/public/' + encodeURIComponent(username));
        document.getElementById('coName').textContent = info.companyName;
        document.title = info.companyName + ' — Цаг захиалах';
      } catch (e) {
        document.getElementById('main').innerHTML =
          '<div class="card"><p class="empty">Байгууллага олдсонгүй. <a href="/">Хайлт руу буцах</a></p></div>';
        return;
      }
      const dp = document.getElementById('datePicker');
      dp.value = todayStr();
      dp.min = todayStr();
      dp.addEventListener('change', loadDay);
      loadNextDays();
      loadDay();
    }

    async function loadNextDays() {
      const wrap = document.getElementById('nextDays');
      try {
        const data = await api('/api/public/' + encodeURIComponent(username) + '/next-days');
        wrap.innerHTML = '';
        const days = Array.isArray(data.days) ? data.days : [];
        days.forEach((day, idx) => {
          const label = idx === 0 ? 'Өнөөдөр' : 'Маргааш';
          const slots = Array.isArray(day.slots) ? day.slots : [];
          const available = slots.filter((s) => s.available).map((s) => HOUR_LABELS[s.hour]);
          wrap.appendChild(el('div', { class: 'row' }, [
            el('div', {}, [
              el('div', { class: 'main', text: label + ' · ' + day.date }),
              el('div', { class: 'sub', text: available.length ? available.join(', ') : 'Сул цаг байхгүй' }),
            ]),
            el('button', { class: 'btn ghost small', text: 'Сонгох', onclick: () => {
              document.getElementById('datePicker').value = day.date;
              loadDay();
            }}),
          ]));
        });
      } catch (_) {
        wrap.innerHTML = '';
      }
    }

    async function loadDay() {
      const date = document.getElementById('datePicker').value;
      if (!date) return;
      const data = await api('/api/public/' + encodeURIComponent(username) + '/day?date=' + date);
      const slots = Array.isArray(data.slots) ? data.slots : [];
      const anyAvailable = slots.some((s) => s.available);
      const banner = document.getElementById('banner');
      if (!anyAvailable) showAlert(banner, 'Энэ өдөр сул цаг алга байна. Өөр өдөр сонгоно уу.', 'error');
      else hideAlert(banner);
      renderSlots(slots);
    }

    function renderSlots(slots) {
      const rowAm = document.getElementById('rowAm');
      const rowPm = document.getElementById('rowPm');
      rowAm.innerHTML = '';
      rowPm.innerHTML = '';
      slots.forEach((s) => {
        const target = s.hour <= 12 ? rowAm : rowPm;
        const cls = ['slot', s.available ? 'available' : 'blocked'];
        if (!s.available) cls.push('disabled');
        const node = el('div', { class: cls.join(' '), onclick: () => {
          if (s.available) openBook(s.hour);
        }}, [
          el('div', { class: 'h', text: String(s.hour) }),
          el('div', { class: 'label', text: HOUR_LABELS[s.hour] }),
        ]);
        target.appendChild(node);
      });
    }

    /* ---------- Захиалгын форм ---------- */
    const bookModal = document.getElementById('bookModal');
    document.getElementById('closeBookBtn').addEventListener('click', () => bookModal.classList.remove('show'));

    function openBook(hour) {
      selectedHour = hour;
      const date = document.getElementById('datePicker').value;
      document.getElementById('bookTime').textContent = date + ' · ' + HOUR_LABELS[hour];
      hideAlert(document.getElementById('bookAlert'));
      document.getElementById('custName').value = '';
      document.getElementById('custPhone').value = '';
      bookModal.classList.add('show');
    }

    document.getElementById('confirmBtn').addEventListener('click', async () => {
      const alert = document.getElementById('bookAlert');
      const date = document.getElementById('datePicker').value;
      try {
        await api('/api/public/' + encodeURIComponent(username) + '/book', {
          method: 'POST',
          body: {
            date, hour: selectedHour,
            customerName: document.getElementById('custName').value.trim(),
            customerPhone: document.getElementById('custPhone').value.trim(),
          },
        });
        bookModal.classList.remove('show');
        showAlert(document.getElementById('banner'),
          'Захиалга амжилттай! ' + date + ' · ' + HOUR_LABELS[selectedHour] + ' цагт хүлээж байна.', 'success');
        loadDay();
      } catch (e) {
        showAlert(alert, e.message);
      }
    });

    init();
  </script>
</body>
</html>
