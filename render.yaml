services:
  - type: web
    name: howsgol-tsag-burtgel
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: SUPERADMIN_USER
        value: superadmin
      - key: SUPERADMIN_PASS
        generateValue: true
