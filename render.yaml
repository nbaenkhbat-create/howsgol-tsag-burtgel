services:
  - type: web
    name: howsgol-tsag-burtgel
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: SUPERADMIN_USER
        value: admin123
      - key: SUPERADMIN_PASS
        value: "123123"
      - key: PAGE_ACCESS_TOKEN
        sync: false
      - key: VERIFY_TOKEN
        value: howsgol-ai_2026
      - key: GROQ_API_KEY
        sync: false
